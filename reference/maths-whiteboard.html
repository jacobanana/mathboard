<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maths Board</title>
<style>
  :root{
    --paper:#FBFAF7; --grid:#CBD8DA; --bar:#1E3A3A; --ink:#1C2826;
    --accent:#F2B33D; --accent-soft:#FBE6B5; --text-on-bar:#EAF2F1; --muted:#7E9897;
    --shade:#F2B33D; --line-ink:#28403F; --panel:#FFFFFF;
    --font:'Segoe UI Rounded', ui-rounded, 'SF Pro Rounded', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:var(--font);background:var(--bar);overflow:hidden;display:flex;flex-direction:column;height:100dvh;color:var(--ink);}
  #toolbar{flex:0 0 auto;background:var(--bar);color:var(--text-on-bar);display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 10px;box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:20;}
  .group{display:flex;align-items:center;gap:6px;}
  #options{min-height:44px;} #options:empty{display:none;}
  .divider{width:1px;align-self:stretch;background:rgba(255,255,255,.16);margin:2px 4px;}
  .opt-sep{width:1px;height:30px;background:rgba(255,255,255,.16);margin:0 3px;}
  .spacer{flex:1 1 auto;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .btn{min-height:44px;padding:0 13px;border-radius:12px;background:rgba(255,255,255,.08);color:var(--text-on-bar);font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:background .12s,transform .06s;white-space:nowrap;}
  .btn:hover{background:rgba(255,255,255,.16);} .btn:active{transform:translateY(1px);}
  .btn.active{background:var(--accent);color:#3a2a05;}
  .btn[disabled]{opacity:.4;pointer-events:none;}
  .btn .ico{font-size:18px;line-height:1;display:inline-flex;} .btn .ico svg{display:block;}
  .btn.small{padding:0 11px;min-width:44px;justify-content:center;}
  .btn.insert{background:var(--accent);color:#3a2a05;} .btn.insert:hover{background:#f0c061;}
  .swatch{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.25);transition:transform .08s,border-color .1s,box-shadow .1s;}
  .swatch:active{transform:scale(.92);} .swatch.active{border-color:#fff;box-shadow:0 0 0 3px var(--accent);}
  .size-dot{display:inline-block;border-radius:50%;}
  #stage{flex:1 1 auto;position:relative;background:var(--paper);overflow:hidden;touch-action:none;}
  #template,#ink{position:absolute;inset:0;width:100%;height:100%;display:block;} #ink{touch-action:none;}
  #textEditor{position:absolute;z-index:7;display:none;border:1px dashed var(--accent);background:rgba(255,255,255,.72);padding:0 2px;margin:0;resize:none;overflow:hidden;white-space:pre;line-height:1.3;min-width:14px;min-height:1em;font-family:var(--font);font-weight:500;}
  .floatbtn{position:absolute;z-index:6;display:none;width:34px;height:34px;border-radius:50%;color:#fff;font-size:16px;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .floatbtn.show{display:flex;} .floatbtn:active{transform:scale(.9);}
  #floatDel{background:var(--ink);} #floatEdit{background:var(--bar);} #floatEdit svg{width:17px;height:17px;}
  #zoomCluster{position:absolute;right:14px;bottom:14px;z-index:6;display:flex;align-items:center;gap:2px;background:#fff;border-radius:14px;padding:4px;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  #zoomCluster button{min-width:40px;height:40px;border-radius:10px;color:var(--ink);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;} #zoomCluster button:hover{background:#EEF1F0;}
  #zoomReset{font-size:14px;min-width:52px;}
  #scrim{position:fixed;inset:0;background:rgba(20,30,30,.45);display:none;align-items:flex-start;justify-content:center;padding-top:64px;z-index:40;}
  #scrim.open{display:flex;}
  .card{background:#fff;color:var(--ink);border-radius:18px;padding:20px 22px 18px;width:min(440px,92vw);box-shadow:0 18px 50px rgba(0,0,0,.3);animation:pop .14s ease;max-height:86vh;overflow:auto;}
  @keyframes pop{from{transform:translateY(-8px);opacity:.4}to{transform:none;opacity:1}}
  .card h2{margin:0 0 4px;font-size:20px;} .card p.hint{margin:0 0 14px;color:var(--muted);font-size:13.5px;}
  .field{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:11px 0;}
  .field label{font-size:15px;font-weight:600;}
  .field input[type=number],.field input[type=text],.field select{font-family:inherit;font-size:16px;font-weight:600;border:2px solid #E0E4E2;border-radius:10px;padding:9px 11px;width:140px;text-align:center;color:var(--ink);background:#fff;}
  .field input:focus,.field select:focus,textarea:focus{outline:none;border-color:var(--accent);}
  .field.check{justify-content:flex-start;gap:10px;cursor:pointer;} .field.check input{width:22px;height:22px;accent-color:var(--bar);}
  .err{color:#D64545;font-size:13.5px;min-height:18px;margin:2px 0 0;font-weight:600;}
  .card-actions{display:flex;gap:10px;margin-top:16px;}
  .card-actions .btn{flex:1;justify-content:center;color:var(--ink);background:#EEF1F0;min-height:48px;} .card-actions .btn:hover{background:#E3E8E6;}
  .card-actions .btn.primary{background:var(--bar);color:#fff;} .card-actions .btn.primary:hover{background:#15302f;}
  .subhead{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:14px 0 2px;}
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .gsub{grid-column:1/-1;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:8px 2px 0;}
  .tile{display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left;background:#F4F6F5;border-radius:12px;padding:12px 13px;color:var(--ink);}
  .tile:hover{background:#E8EDEB;} .tile b{font-size:15px;} .tile span{font-size:12px;color:var(--muted);}
  #paperMenu{position:fixed;display:none;flex-direction:column;gap:4px;background:#fff;border-radius:14px;padding:7px;z-index:45;box-shadow:0 12px 34px rgba(0,0,0,.26);min-width:150px;}
  #paperMenu.open{display:flex;} #paperMenu button{text-align:left;color:var(--ink);font-size:15px;font-weight:600;padding:11px 13px;border-radius:10px;} #paperMenu button:hover{background:#EEF1F0;} #paperMenu button.active{background:var(--accent-soft);}
  #help .row{display:flex;gap:11px;margin:13px 0;align-items:flex-start;} #help .row .n{flex:0 0 26px;height:26px;border-radius:50%;background:var(--accent-soft);color:#7a5a10;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;} #help .row p{margin:1px 0;font-size:14.5px;line-height:1.4;}
  @media (max-width:760px){.btn{padding:0 10px;font-size:14px;}.btn .label{display:none;}.btn.keep-label .label{display:inline;}.swatch{width:34px;height:34px;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  .ilayer{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden;}
  .iworksheet{position:absolute;transform-origin:0 0;pointer-events:auto;width:300px;background:#fff;border:1px solid #E4D9B8;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.16);overflow:hidden;}
  .iw-head{display:flex;align-items:center;gap:6px;background:var(--bar);color:#fff;padding:7px 9px;cursor:grab;user-select:none;touch-action:none;}
  .iw-head:active{cursor:grabbing;}
  .iw-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iw-sp{flex:1;}
  .iw-btn{background:rgba(255,255,255,.16);color:#fff;border-radius:8px;font-size:12px;font-weight:700;padding:5px 9px;}
  .iw-btn.check{background:var(--accent);color:#3a2a05;}
  .iw-x{color:#fff;font-size:17px;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .iw-x:hover,.iw-btn:hover{filter:brightness(1.08);}
  .iw-body{padding:8px 12px 12px;}
  .iw-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:16px;color:var(--ink);}
  .iw-q{min-width:84px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;}
  .iw-in{width:64px;font-family:inherit;font-size:16px;font-weight:700;text-align:center;border:2px solid #E0E4E2;border-radius:8px;padding:5px 4px;color:var(--ink);background:#fff;}
  .iw-in:focus{outline:none;border-color:var(--accent);}
  .iw-in.ok{border-color:#2E9E5B;background:#EAF7EE;} .iw-in.no{border-color:#D64545;background:#FBECEC;}
  .iw-mark{font-size:15px;font-weight:800;min-width:48px;}
  .iw-mark.ok{color:#2E9E5B;} .iw-mark.no{color:#D64545;}
  .iw-score{margin-top:8px;font-weight:800;font-size:14px;color:var(--bar);min-height:18px;}
</style>
</head>
<body>
  <div id="toolbar">
    <div class="group" id="modes">
      <button class="btn" id="drawBtn" title="Draw"><span class="ico" id="drawIco"></span><span class="label">Draw</span></button>
      <button class="btn" id="textBtn" title="Type text"><span class="ico" id="textIco"></span><span class="label">Text</span></button>
    </div>
    <div class="divider"></div>
    <div class="group" id="options"></div>
    <div class="divider"></div>
    <button class="btn" id="selectBtn" title="Select & move"><span class="ico">↖</span><span class="label">Select</span></button>
    <button class="btn" id="panBtn" title="Move the view"><span class="ico">✋</span><span class="label">Pan</span></button>
    <button class="btn" id="eraserBtn" title="Eraser"><span class="ico" id="eraserIco"></span><span class="label">Eraser</span></button>
    <div class="divider"></div>
    <button class="btn insert keep-label" id="insertBtn"><span class="ico">＋</span><span class="label">Insert</span></button>
    <div class="divider"></div>
    <button class="btn" id="paperBtn"><span class="ico">▦</span><span class="label">Paper</span></button>
    <button class="btn" id="undoBtn"><span class="ico">↶</span><span class="label">Undo</span></button>
    <button class="btn" id="redoBtn"><span class="ico">↷</span><span class="label">Redo</span></button>
    <button class="btn" id="editObjBtn" title="Edit selected object"><span class="ico" id="editIco"></span><span class="label">Edit</span></button>
    <button class="btn" id="deleteObjBtn" title="Delete selected object"><span class="ico">🗙</span><span class="label">Delete</span></button>
    <div class="spacer"></div>
    <button class="btn keep-label" id="saveBtn"><span class="ico">⤓</span><span class="label">Save image</span></button>
    <button class="btn keep-label" id="helpBtn"><span class="ico">?</span><span class="label">Help</span></button>
  </div>

  <div id="stage">
    <canvas id="template"></canvas>
    <canvas id="ink"></canvas>
    <div id="ilayer" class="ilayer"></div>
    <textarea id="textEditor" spellcheck="false"></textarea>
    <button class="floatbtn" id="floatEdit" title="Edit this object"></button>
    <button class="floatbtn" id="floatDel" title="Delete this object">🗙</button>
    <div id="zoomCluster"><button id="zoomOut" title="Zoom out">−</button><button id="zoomReset" title="Reset to 100%">100%</button><button id="zoomIn" title="Zoom in">+</button></div>
  </div>

  <div id="paperMenu"><button data-bg="squared">Squares</button><button data-bg="lined">Lines</button><button data-bg="blank">Blank</button></div>
  <div id="scrim"><div class="card" id="card"></div></div>

<script>
(function(){
  "use strict";
  const stage=document.getElementById('stage');
  const tCanvas=document.getElementById('template'), iCanvas=document.getElementById('ink');
  const tctx=tCanvas.getContext('2d'), ictx=iCanvas.getContext('2d');
  const ta=document.getElementById('textEditor');
  const FONT=getComputedStyle(document.body).fontFamily;
  const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  const ICON={
    draw:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    text:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',
    eraser:'<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>'
  };
  $('drawIco').innerHTML=ICON.draw; $('textIco').innerHTML=ICON.text; $('eraserIco').innerHTML=ICON.eraser; $('editIco').innerHTML=ICON.draw; $('floatEdit').innerHTML=ICON.draw;

  let W=0,H=0,dpr=1;
  const MIN_SCALE=0.2, MAX_SCALE=4;
  const camera={x:0,y:0,scale:1};
  let background='squared';
  let objects=[], strokes=[];
  let selectedId=null, nextId=1;
  let currentTool='pen';
  let currentColor=css('--ink'), penSize=6, textSize=26;
  const ERASER=30;
  let modalOpen=false;

  const PALETTE=[['black','#1C2826'],['blue','#2E6FB7'],['red','#D64545'],['green','#2E9E5B'],['orange','#E8842B']];
  const PEN_SIZES=[['S',3],['M',6],['L',12]];
  const TEXT_SIZES=[['S',18],['M',26],['L',40]];

  function partition(num){ const s=String(Math.abs(Math.trunc(num))), arr=[], L=s.length; for(let i=0;i<L;i++){ const d=+s[i]; if(d!==0) arr.push(d*Math.pow(10,L-1-i)); } if(!arr.length) arr.push(0); return arr; }
  const to24=(h,m)=>String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  function to12(h,m){ const ap=h<12?'am':'pm'; let hh=h%12; if(hh===0) hh=12; return hh+':'+String(m).padStart(2,'0')+' '+ap; }
  function roundRect(ctx,x,y,w,h,r){ if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r}; ctx.beginPath(); ctx.moveTo(x+r.tl,y); ctx.lineTo(x+w-r.tr,y); ctx.arcTo(x+w,y,x+w,y+r.tr,r.tr); ctx.lineTo(x+w,y+h-r.br); ctx.arcTo(x+w,y+h,x+w-r.br,y+h,r.br); ctx.lineTo(x+r.bl,y+h); ctx.arcTo(x,y+h,x,y+h-r.bl,r.bl); ctx.lineTo(x,y+r.tl); ctx.arcTo(x,y,x+r.tl,y,r.tl); ctx.closePath(); }
  function wrapText(ctx,text,maxW,font){ ctx.font=font; const out=[]; (text||'').split('\n').forEach(para=>{ const words=para.split(/\s+/).filter(Boolean); let line=''; if(!words.length){ out.push(''); return; } for(const wd of words){ const t=line?line+' '+wd:wd; if(ctx.measureText(t).width>maxW && line){ out.push(line); line=wd; } else line=t; } out.push(line); }); return out.length?out:['']; }
  function noteSize(text){ const maxW=360-46; const lines=wrapText(tctx,text,maxW,'500 17px '+FONT); return {w:360, h:18+24+lines.length*24+16}; }
  function textSizeOf(text,size){ tctx.font='500 '+size+'px '+FONT; const lines=(text||' ').split('\n'); let w=0; lines.forEach(l=>{ w=Math.max(w,tctx.measureText(l||' ').width); }); return {w:Math.max(w+6,24), h:Math.max(lines.length*size*1.3,size)}; }
  const fmtNum=n=>String(Math.round(n*1e6)/1e6);
  const fillPanel=(o,c)=>{ tctx.fillStyle=c||css('--panel'); tctx.fillRect(o.x,o.y,o.w,o.h); };
  function drawRightNum(s,rightX,cy,dw){ s=String(s); for(let j=s.length-1,k=0;j>=0;j--,k++){ tctx.fillText(s[j], rightX-k*dw-dw/2, cy); } }
  function longDivSteps(dividend,divisor){ const digits=String(dividend).split('').map(Number); const v=divisor; let rem=0,started=false; const q=[],steps=[]; for(let i=0;i<digits.length;i++){ const w=rem*10+digits[i]; const qd=Math.floor(w/v); rem=w-qd*v; if(qd>0) started=true; q.push({d:qd,draw:started,col:i}); if(started) steps.push({minuend:w,prod:qd*v,rem,col:i}); } return {q,steps,remainder:rem}; }
  function chunkSteps(dividend,divisor){ let rem=dividend; const chunks=[]; const q=Math.floor(dividend/divisor); const tens=Math.floor(q/10)*10; if(tens>0){ chunks.push({mult:tens,sub:tens*divisor}); rem-=tens*divisor; } const ones=q-tens; if(ones>0){ chunks.push({mult:ones,sub:ones*divisor}); rem-=ones*divisor; } return {chunks,answer:q,remainder:rem}; }

  let undoStack=[], redoStack=[];
  const snap=()=>JSON.stringify({objects,strokes});
  function pushHistory(){ undoStack.push(snap()); if(undoStack.length>60) undoStack.shift(); redoStack=[]; }
  function commitPre(pre){ undoStack.push(pre); if(undoStack.length>60) undoStack.shift(); redoStack=[]; }
  function restore(str){ const s=JSON.parse(str); objects=s.objects; strokes=s.strokes; if(!objects.some(o=>o.id===selectedId)) selectedId=null; }
  function undo(){ if(editor) commitEditor(); if(!undoStack.length) return; redoStack.push(snap()); restore(undoStack.pop()); renderAll(); updateEdit(); }
  function redo(){ if(editor) commitEditor(); if(!redoStack.length) return; undoStack.push(snap()); restore(redoStack.pop()); renderAll(); updateEdit(); }

  const screenToWorld=(sx,sy)=>({x:(sx-camera.x)/camera.scale, y:(sy-camera.y)/camera.scale});
  const worldToScreen=(wx,wy)=>({x:wx*camera.scale+camera.x, y:wy*camera.scale+camera.y});
  function evPos(e){ const r=iCanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
  function applyCam(ctx){ ctx.setTransform(camera.scale*dpr,0,0,camera.scale*dpr,camera.x*dpr,camera.y*dpr); }

  function sep(c){ const s=document.createElement('span'); s.className='opt-sep'; c.appendChild(s); }
  function addColours(c){ PALETTE.forEach(([name,hex])=>{ const b=document.createElement('button'); b.className='swatch'+(currentColor===hex?' active':''); b.style.background=hex; b.title=name; b.onclick=()=>{ currentColor=hex; if(editor){ editor.obj.color=hex; ta.style.color=hex; } renderOptions(); }; c.appendChild(b); }); }
  function addPenSizes(c){ PEN_SIZES.forEach(([lbl,px])=>{ const b=document.createElement('button'); b.className='btn small'+(penSize===px?' active':''); b.title=lbl+' pen'; const d=document.createElement('span'); d.className='size-dot'; d.style.width=Math.max(6,px)+'px'; d.style.height=Math.max(6,px)+'px'; d.style.background='currentColor'; b.appendChild(d); b.onclick=()=>{ penSize=px; renderOptions(); }; c.appendChild(b); }); }
  function addTextSizes(c){ TEXT_SIZES.forEach(([lbl,px],i)=>{ const b=document.createElement('button'); b.className='btn small'+(textSize===px?' active':''); b.title=lbl+' text'; b.innerHTML='<span style="font-weight:800;font-size:'+[14,17,21][i]+'px">A</span>'; b.onclick=()=>{ textSize=px; if(editor){ editor.obj.size=px; ta.style.font='500 '+(px*camera.scale)+'px '+FONT; autoSize(); } renderOptions(); }; c.appendChild(b); }); }
  function renderOptions(){ const opt=$('options'); opt.innerHTML=''; if(currentTool==='pen'){ addColours(opt); sep(opt); addPenSizes(opt); } else if(currentTool==='text'){ addColours(opt); sep(opt); addTextSizes(opt); } }

  function setTool(t){ if(editor) commitEditor(); currentTool=t; iCanvas.style.cursor=t==='pan'?'grab':(t==='select'?'default':(t==='text'?'text':'crosshair'));
    $('drawBtn').classList.toggle('active',t==='pen'); $('textBtn').classList.toggle('active',t==='text'); $('selectBtn').classList.toggle('active',t==='select'); $('panBtn').classList.toggle('active',t==='pan'); $('eraserBtn').classList.toggle('active',t==='eraser'); renderOptions(); renderBack(); }
  $('drawBtn').onclick=()=>setTool('pen'); $('textBtn').onclick=()=>setTool('text'); $('selectBtn').onclick=()=>setTool('select'); $('panBtn').onclick=()=>setTool('pan'); $('eraserBtn').onclick=()=>setTool('eraser');

  function resize(){ if(editor) commitEditor(); const r=stage.getBoundingClientRect(); dpr=window.devicePixelRatio||1; W=r.width; H=r.height; [tCanvas,iCanvas].forEach(c=>{ c.width=Math.round(W*dpr); c.height=Math.round(H*dpr); }); renderAll(); }
  window.addEventListener('resize',resize);

  function objSize(type,p){
    switch(type){
      case 'numberline': return {w:clamp(p.intervals*54,260,1000), h:64};
      case 'fraction': if(p.mode==='wall') return {w:480, h:p.max*34}; if(p.mode==='circle'){ const r=86; return {w:2*r, h:2*r+40}; } { const bh=58,gap=20; return {w:358, h:p.bars.length*bh+(p.bars.length-1)*gap}; }
      case 'placevalue': { let w=0; p.cols.forEach(c=> w+= c==='.'?20:54); return {w, h:36+46*3}; }
      case 'timestable': if(p.mode==='single') return {w:240, h:p.rows*34}; return {w:(p.n+1)*40, h:(p.n+1)*40};
      case 'gridmethod': return {w:(partition(p.a).length+1)*72, h:(partition(p.b).length+1)*54};
      case 'longmult': { const nP=String(p.b).length, R=2+nP+(nP>1?1:0), tc=String(p.a*p.b).length; return {w:(tc+1)*32, h:R*42+12}; }
      case 'shortmult': { const tc=String(p.a*p.b).length; return {w:(tc+1)*30, h:26+3*40+14}; }
      case 'array': return {w:Math.max(p.cols*30+28,200), h:p.rows*30+12+44};

  const ilayer=$('ilayer');
  let iwidgets=[]; const inodes=new Map();
  const rnd=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  function genQuestions(cfg){ const q=[]; if(cfg.mode==='times'){ for(let i=1;i<=cfg.rows;i++) q.push({a:i,op:'×',b:cfg.k,ans:i*cfg.k}); return q; } const m=Math.min(cfg.max,12); for(let i=0;i<cfg.n;i++){ const op=cfg.op==='mixed'?['+','−','×','÷'][rnd(0,3)]:cfg.op; let a,b,ans; if(op==='+'){ a=rnd(1,cfg.max); b=rnd(1,cfg.max); ans=a+b; } else if(op==='−'){ a=rnd(1,cfg.max); b=rnd(0,a); ans=a-b; } else if(op==='×'){ a=rnd(2,m); b=rnd(2,m); ans=a*b; } else { b=rnd(2,m); const qq=rnd(2,m); a=b*qq; ans=qq; } q.push({a,op,b,ans}); } return q; }

  function checkWidget(w){ const node=inodes.get(w.id); if(!node) return; const ins=node.querySelectorAll('.iw-in'), mks=node.querySelectorAll('.iw-mark'); let correct=0; w.questions.forEach((q,i)=>{ const raw=ins[i].value.trim(); ins[i].classList.remove('ok','no'); mks[i].classList.remove('ok','no'); mks[i].textContent=''; if(raw==='') return; if(Number(raw)===q.ans){ correct++; ins[i].classList.add('ok'); mks[i].classList.add('ok'); mks[i].textContent='✓'; } else { ins[i].classList.add('no'); mks[i].classList.add('no'); mks[i].textContent='✗ '+q.ans; } }); node.querySelector('.iw-score').textContent=correct+' / '+w.questions.length+' correct'; }

  function updateWorksheet(w,cfg){ Object.assign(w,cfg); w.questions=genQuestions(w); const el=inodes.get(w.id); if(el) el.querySelector('.iw-title').textContent=widgetTitle(w); rebuildWidget(w); }
  function removeWidget(id){ const el=inodes.get(id); if(el) el.remove(); inodes.delete(id); iwidgets=iwidgets.filter(w=>w.id!==id); }

  function worksheetDialog(ex){ const mode=ex?ex.mode:'times', k=ex&&ex.k?ex.k:7, rows=ex&&ex.rows?ex.rows:12, op=ex&&ex.op?ex.op:'+', n=ex&&ex.n?ex.n:10, max=ex&&ex.max?ex.max:12;
    openModal(`<h2>Practice — type &amp; check</h2><p class="hint">She types each answer and taps Check to mark them. “New” makes fresh questions. Drag the dark bar to move it.</p>
      <div class="field"><label for="wsMode">Type</label><select id="wsMode"><option value="times"${mode==='times'?' selected':''}>Times table</option><option value="ops"${mode==='ops'?' selected':''}>Mixed questions</option></select></div>
      <div id="wsTimes"><div class="field"><label for="wsK">Which table</label><input id="wsK" type="number" value="${k}" min="1" max="20"></div><div class="field"><label for="wsRows">Up to</label><input id="wsRows" type="number" value="${rows}" min="5" max="20"></div></div>
      <div id="wsOps" style="display:none"><div class="field"><label for="wsOp">Operation</label><select id="wsOp"><option value="+"${op==='+'?' selected':''}>Addition (+)</option><option value="−"${op==='−'?' selected':''}>Subtraction (−)</option><option value="×"${op==='×'?' selected':''}>Multiplication (×)</option><option value="÷"${op==='÷'?' selected':''}>Division (÷)</option><option value="mixed"${op==='mixed'?' selected':''}>Mixed</option></select></div>
        <div class="field"><label for="wsN">How many</label><input id="wsN" type="number" value="${n}" min="1" max="20"></div>
        <div class="field"><label for="wsMax">Numbers up to</label><select id="wsMax">${[10,12,20,50,100].map(v=>`<option value="${v}"${max===v?' selected':''}>${v}</option>`).join('')}</select></div></div>
      <div class="card-actions"><button class="btn" id="wsCancel">${ex?'Cancel':'Back'}</button><button class="btn primary" id="wsAdd">${ex?'Save':'Add to board'}</button></div>`);
    const upd=()=>{ const m=$('wsMode').value; $('wsTimes').style.display=m==='times'?'block':'none'; $('wsOps').style.display=m==='ops'?'block':'none'; }; $('wsMode').onchange=upd; upd(); $('wsCancel').onclick=ex?closeModal:insertGallery;
    $('wsAdd').onclick=()=>{ const m=$('wsMode').value; let cfg; if(m==='times'){ cfg={mode:'times',k:clamp(parseInt($('wsK').value,10)||2,1,20),rows:clamp(parseInt($('wsRows').value,10)||12,1,20)}; } else { cfg={mode:'ops',op:$('wsOp').value,n:clamp(parseInt($('wsN').value,10)||10,1,20),max:parseInt($('wsMax').value,10)}; } if(ex) updateWorksheet(ex,cfg); else addWorksheet(cfg); closeModal(); }; }

  $('saveBtn').onclick=()=>{ if(editor) commitEditor(); const out=document.createElement('canvas'); out.width=Math.round(W*dpr); out.height=Math.round(H*dpr); const o=out.getContext('2d'); o.fillStyle=css('--paper'); o.fillRect(0,0,out.width,out.height); o.drawImage(tCanvas,0,0); o.drawImage(iCanvas,0,0); const a=document.createElement('a'); a.download='maths-board-'+new Date().toISOString().slice(0,10)+'.png'; a.href=out.toDataURL('image/png'); a.click(); };

  $('helpBtn').onclick=()=>{ openModal(`<h2>Quick guide</h2><div id="help">
      <div class="row"><div class="n">1</div><p><b>Whoever is explaining shares their screen</b> on Meet. You share to show a method; she opens this on her tablet and shares <i>her</i> screen for her turn.</p></div>
      <div class="row"><div class="n">2</div><p><b>Draw</b> writes by hand; <b>Text</b> types. The options strip changes to match — pen colour & thickness, or colour & text size.</p></div>
      <div class="row"><div class="n">3</div><p><b>Insert</b> adds tools. Methods (times tables, multiplication, division) have a <b>“Fill in the answers”</b> tick so you can show a worked example or leave it blank to do together.</p></div>
      <div class="row"><div class="n">4</div><p><b>Select</b> (↖) to move. <b>Edit</b> (or double-click a widget) changes its settings; the <b>×</b> or Delete removes it. Zoom with −/+, pinch or ⌘/Ctrl+scroll; pan with ✋, two fingers or scroll.</p></div>
      </div><div class="card-actions"><button class="btn primary" id="hOk" style="flex:1">Got it</button></div>`); $('hOk').onclick=closeModal; };

  setTool('pen'); resize(); updateEdit(); updateZoom();
})();
</script>
</body>
</html>
